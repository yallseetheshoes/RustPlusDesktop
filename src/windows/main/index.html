<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="dark">
    <link rel="stylesheet" href="index.css">
    <title>Rust+</title>
</head>
<body>
    <div class="loader">
        <span>Connecting to FCM</span>
        <div class="FCM-bar">
            <div class="FCM-progress"></div>
        </div>
        <span>Connecting to Rust+</span>
        <div class="Rustplus-bar">
            <div class="Rustplus-progress"></div>
        </div>
        <div class="spinner"></div>
    </div>
    <div class="app">
        <div class="server-sidebar">
            <div class="server-sidebar-content">
                <div draggable="false" class="server-badge" data-popup-right="[EU] Facepunch Premium 3"><img src="https://files.facepunch.com/Alistair/124/07/2025/9593/fpos.png" alt=""></div>
                <div draggable="false" class="server-badge" data-popup-right="[EU] Facepunch Premium 3"><img src="https://files.facepunch.com/Alistair/124/07/2025/9593/fpos.png" alt=""></div>
                <div draggable="false" class="server-badge" data-popup-right="[EU] Facepunch Premium 3"><img src="https://files.facepunch.com/Alistair/124/07/2025/9593/fpos.png" alt=""></div>
                <div draggable="false" class="server-badge" data-popup-right="[EU] Facepunch Premium 3"><img src="https://files.facepunch.com/Alistair/124/07/2025/9593/fpos.png" alt=""></div>
                <div draggable="false" class="server-badge" data-popup-right="[EU] Facepunch Premium 3"><img src="https://files.facepunch.com/Alistair/124/07/2025/9593/fpos.png" alt=""></div>
                <div draggable="false" class="server-badge" data-popup-right="[EU] Facepunch Premium 3"><img src="https://files.facepunch.com/Alistair/124/07/2025/9593/fpos.png" alt=""></div>
                <div draggable="false" class="server-badge" data-popup-right="[EU] Facepunch Premium 3"><img src="https://files.facepunch.com/Alistair/124/07/2025/9593/fpos.png" alt=""></div>
                <div draggable="false" class="server-badge" data-popup-right="[EU] Facepunch Premium 3"><img src="https://files.facepunch.com/Alistair/124/07/2025/9593/fpos.png" alt=""></div>


            </div>
            <div class="server-sidebar-footer">
                <div class="server-badge" data-popup-right="Settings">
                    <span>⚙</span>
                </div>
            </div>
        </div>
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-server-name"></span>
            </div>
            <div class="sidebar-content">
                <button class="sidebar-item active" data-page="home">
                    <span>Home</span>
                </button>
                <button class="sidebar-item" data-page="map">
                    <span>Map</span>
                </button>
                <button class="sidebar-item" data-page="devices">
                    <span>Devices</span>
                </button>
            </div>
            <button class="sidebar-item settings">
                <span>Settings</span>
            </button>
        </div>
        <div class="main">
            <div class="main-loader finished">
                <span>Reconnecting to Rust+</span>
                <div class="spinner"></div>
            </div>
            <div class="main-content">
                <div class="home-page">
                    <div class="main-card devices">
                        <div class="minicard idk">

                        </div>
                    </div>
                    <div class="main-card map">
                    </div>
                </div>
                <div class="devices-page">
                    <div class="main-card-devices">
                        <div class="card-device">

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="renderer.js"></script>
</html>
